# Release stage template for DEV, UAT, and PRD environments.
# Included by azure-pipelines.yml — do not run directly.
parameters:
  - name: p_publishEnvironment
    type: string
  - name: p_dependsOn
    type: string
  - name: p_hasMetCondition
    type: string

stages:
  - stage: Release_${{ parameters.p_publishEnvironment }}
    displayName: 🚀 Release ${{ parameters.p_publishEnvironment }}
    dependsOn: ${{ parameters.p_dependsOn }}
    condition: ${{ parameters.p_hasMetCondition }}
    variables:
      - group: azdoboards-config-${{ lower(parameters.p_publishEnvironment) }}
    jobs:
      - deployment: Infrastructure
        displayName: Deploy Infrastructure
        environment: AzDoBoards ${{ parameters.p_publishEnvironment }}
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadBuildArtifacts@1
                  displayName: Download Bicep Artifact
                  inputs:
                    artifactName: bicep
                    downloadPath: $(Pipeline.Workspace)

                - task: AzureResourceManagerTemplateDeployment@3
                  displayName: Implement Infrastructure with Bicep
                  inputs:
                    azureResourceManagerConnection: $(a_AzureServiceConnection)
                    subscriptionId: $(a_SubscriptionId)
                    deploymentScope: Resource Group
                    action: Create Or Update Resource Group
                    resourceGroupName: $(a_ResourceGroup)
                    location: $(a_AzureLocationPrimary)
                    templateLocation: Linked artifact
                    csmFile: $(Pipeline.Workspace)/bicep/azure-resources.bicep
                    overrideParameters: >
                      -name $(a_SwaName)
                      -sku $(a_SwaSkuName)
                    deploymentMode: Incremental # Incremental, Complete, Validation

      - deployment: App
        displayName: Deploy Application
        dependsOn: Infrastructure
        environment: AzDoBoards ${{ parameters.p_publishEnvironment }}
        strategy:
          runOnce:
            deploy:
              steps:
                # AzureStaticWebApp@0 runs inside a Docker container that mounts $(System.DefaultWorkingDirectory) as /working_dir (hardcoded in the task).
                # app_location paths are resolved relative to that mount, so artifactsmust be downloaded here rather than $(Pipeline.Workspace).
                - task: DownloadBuildArtifacts@1
                  displayName: Download App Artifact
                  inputs:
                    artifactName: wwwroot
                    downloadPath: $(System.DefaultWorkingDirectory)

                - pwsh: |
                    Get-ChildItem "$(System.DefaultWorkingDirectory)/wwwroot" -Recurse -Depth 3 | Select-Object -ExpandProperty FullName | Sort-Object
                  displayName: "🐞 List Downloaded Artifact Folder"
                  condition: and(succeeded(), eq(variables['a_IsDebug'], 'true'))

                - task: FileTransform@2
                  displayName: Transform appsettings.json Values
                  inputs:
                    folderPath: $(System.DefaultWorkingDirectory)/wwwroot/AzDoBoards.Ui/wwwroot
                    jsonTargetFiles: appsettings.json

                - task: AzureCLI@2
                  displayName: Retrieve SWA Deployment Token
                  inputs:
                    azureSubscription: $(a_AzureServiceConnection)
                    scriptType: pscore
                    scriptLocation: inlineScript
                    failOnStandardError: true
                    inlineScript: |
                      $token = az staticwebapp secrets list `
                        --name $(a_SwaName) `
                        --resource-group $(a_ResourceGroup) `
                        --query "properties.apiKey" -o tsv
                      if ([string]::IsNullOrWhiteSpace($token)) {
                        Write-Host "##[error]Failed to retrieve SWA deployment token — check that $(a_SwaName) exists in $(a_ResourceGroup) and the service connection has read access."
                        exit 1
                      }
                      Write-Host "##vso[task.setvariable variable=o_SwaDeployToken;isSecret=true]$token"

                - pwsh: |
                    Write-Host "Token length: $($env:TOKEN.Length)"
                  displayName: Verify SWA Token Retrieved
                  condition: and(succeeded(), eq(variables['a_IsDebug'], 'true'))
                  env:
                    TOKEN: $(o_SwaDeployToken)

                - task: AzureStaticWebApp@0
                  displayName: Deploy App to Static Web App
                  inputs:
                    app_location: wwwroot/AzDoBoards.Ui/wwwroot # Artifact folder > Source of the SWA deployment
                    skip_app_build: true
                    azure_static_web_apps_api_token: $(o_SwaDeployToken)
