# VARIABLE NAMING
# a_VarName           Variable passed as an argument, such as via Azure Pipeline variable group (evaluated at runtime)
# g_VarName           Global variable across YAML files (evaluated at compile time or initial runtime)
# p_VarName           Parameter passed for use only within a file
# v_VarName           Local variable intended within a file
# o_VarName           Output variable from a job or step (dynamic evaluation at runtime)
# *_IsStrVarName      Is/Has String (used for expressions) - not really boolean, but eq(*_isStrVarName, true) works through coercion
# *_IsVariable        Is/Has Boolean (used for expressions directly)
trigger:
  branches:
    include:
      - release/*
      - feature/*

pool:
  vmImage: ubuntu-latest

variables:
  # Required variable groups and their variables are documented in README.md under Installation.
  - group: azdoboards-config
  - name: g_BuildConfiguration
    value: Release
  - name: g_AppBaseName
    value: AzDoBoards
  - name: a_SwaSkuName
    value: Standard # default value unless overridden in variable group
  - name: v_IsReleaseBranch
    value: $[startsWith(variables['Build.SourceBranch'], 'refs/heads/release/')]
  - name: v_IsFeatureBuildBranch
    value: $[and(startsWith(variables['Build.SourceBranch'], 'refs/heads/feature/'), contains(variables['Build.SourceBranch'], '/build/'))]

stages:
  - stage: Build
    displayName: 🔨 Build
    jobs:
      - job: Build
        displayName: Build and Publish
        steps:
          - task: UseDotNet@2
            displayName: Install .NET 10 SDK
            inputs:
              packageType: sdk
              version: 10.x

          - task: DotNetCoreCLI@2
            displayName: Publish App
            inputs:
              command: publish
              publishWebProjects: false
              projects: AzDoBoards.Ui/AzDoBoards.Ui.csproj
              arguments: -c $(g_BuildConfiguration) -o $(Build.ArtifactStagingDirectory)/publish
              zipAfterPublish: false

          - pwsh: |
              # Remove dotnet publish pre-compresses static assets (e.g., appsettings.json.br, appsettings.json.gz) since not useful with followup FileTransform. Azure Static Web Apps CDN applies dynamic compression at serve time.
              $wwwroot = "$(Build.ArtifactStagingDirectory)/publish/AzDoBoards.Ui/wwwroot"
              $files = Get-ChildItem $wwwroot | Where-Object { $_.Name -like "appsettings.json.*" }
              if ($files) {
                $files | ForEach-Object { Write-Host "Removing: $($_.FullName)" }
                $files | Remove-Item -Force
              } else {
                Write-Host "No pre-compressed appsettings.json files found."
              }
            displayName: Remove Pre-Compressed appsettings.json

          - task: PublishBuildArtifacts@1
            displayName: Upload App Artifact
            inputs:
              pathToPublish: $(Build.ArtifactStagingDirectory)/publish
              artifactName: wwwroot

          - task: PublishBuildArtifacts@1
            displayName: Upload Bicep Artifact
            inputs:
              pathToPublish: azure-resources.bicep
              artifactName: bicep

  - template: azure-pipelines-release.yml
    parameters:
      p_publishEnvironment: DEV
      p_dependsOn: Build
      p_hasMetCondition: and(succeeded(), or(eq(variables.v_IsReleaseBranch, true), eq(variables.v_IsFeatureBuildBranch, true)), contains(variables['a_ReleaseEnvPipeList'], 'DEV'))

  - template: azure-pipelines-release.yml
    parameters:
      p_publishEnvironment: UAT
      p_dependsOn: Release_DEV
      p_hasMetCondition: and(not(failed()), eq(variables.v_IsReleaseBranch, true), contains(variables['a_ReleaseEnvPipeList'], 'UAT'))

  - template: azure-pipelines-release.yml
    parameters:
      p_publishEnvironment: PRD
      p_dependsOn: Release_UAT
      p_hasMetCondition: and(not(failed()), eq(variables.v_IsReleaseBranch, true), contains(variables['a_ReleaseEnvPipeList'], 'PRD'))

# ~END~
